<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Tarrant Collective — Wireframe Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', sans-serif;
      background: #1a1714;
      color: #f5f0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .brand {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 0.75rem;
    }

    .brand p {
      font-size: 0.8rem;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #a89a8a;
    }

    .gate {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      max-width: 1100px;
      width: 100%;
    }

    .gate a {
      text-decoration: none;
      color: inherit;
      border: 1px solid #3a3530;
      border-radius: 4px;
      padding: 2.5rem 2rem;
      text-align: center;
      transition: border-color 0.3s, background 0.3s;
    }

    .gate a:hover {
      border-color: #a89a8a;
      background: rgba(168, 154, 138, 0.06);
    }

    .gate .label {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 400;
      display: block;
      margin-bottom: 0.75rem;
    }

    .gate .desc {
      font-size: 0.78rem;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #a89a8a;
      display: block;
      margin-bottom: 1.25rem;
    }

    .gate .enter {
      font-size: 0.7rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #f5f0e8;
      border-bottom: 1px solid #a89a8a;
      padding-bottom: 2px;
    }

    .footer-note {
      margin-top: 3.5rem;
      font-size: 0.7rem;
      color: #5a5248;
      text-align: center;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    @media (max-width: 900px) {
      .gate { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 540px) {
      .gate { grid-template-columns: 1fr; gap: 1.25rem; }
      .brand h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="brand">
    <h1>The Tarrant Collective</h1>
    <p>Wireframe Review</p>
  </div>

  <div class="gate">
    <a href="./wireframe/">
      <span class="label">Wireframe A</span>
      <span class="desc">Structured</span>
      <span class="enter">View</span>
    </a>
    <a href="./wireframe-b/">
      <span class="label">Wireframe B</span>
      <span class="desc">Editorial</span>
      <span class="enter">View</span>
    </a>
    <a href="./wireframe-c/">
      <span class="label">Wireframe C</span>
      <span class="desc">Production Luxury</span>
      <span class="enter">View</span>
    </a>
    <a href="./website/">
      <span class="label">The Website</span>
      <span class="desc">Full Build Preview</span>
      <span class="enter">View</span>
    </a>
  </div>

  <p class="footer-note">Wireframes A–C include palette toggle, image toggle, and click-to-comment feedback.</p>

</body>
</html>
